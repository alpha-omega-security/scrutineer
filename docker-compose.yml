# scrutineer with the default embedded SQLite backend.
#
#   docker compose -f docker/docker-compose.sqlite.yml up --build
#
# The database is a single file inside the scrutineer-data volume
# (/data/scrutineer.db); there is no separate database service.
name: scrutineer-sqlite

services:
  scrutineer:
    build:
      context: .
      dockerfile: docker/cmd/Dockerfile
    image: scrutineer:local
    # The UI has no authentication — bind to loopback on the host.
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - scrutineer-data:/data          # holds scrutineer.db + scan workspaces
      - ./scrutineer.yaml:/config/scrutineer.yaml:ro   # the repo-root config
    environment:
      # Provide one of these (see the README auth section). Empty defaults let
      # `docker compose up` start before you have set them.
      CLAUDE_CODE_OAUTH_TOKEN: "${CLAUDE_CODE_OAUTH_TOKEN:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      ANTHROPIC_BASE_URL: "${ANTHROPIC_BASE_URL:-}"
    restart: unless-stopped
    # The image's default CMD already selects SQLite:
    #   -addr 0.0.0.0:8080 -data /data   (db at /data/scrutineer.db)
    #
    # Scans run with --no-container (no isolation) because this container has no
    # access to a container runtime. To run scans in the ephemeral runner
    # containers, mount a Docker socket and drop the non-root USER, or run
    # scrutineer on the host instead. See README "Docker".

volumes:
  scrutineer-data:
